<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penalty — Suite de Juegos Educativos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ---------- PANTALLA DE MENÚ ---------- -->
  <div id="menuScreen">
    <h1>⚽ PENALTY <span>Suite</span></h1>
    <p class="subtitle">Elige tu partido de entrenamiento</p>

    <div class="game-grid">
      <button class="game-card" data-game="word-game">
        <span class="card-emoji">🔤</span>
        <span class="card-title">Penalty Typing</span>
        <span class="card-desc">Entrena mecanografía pateando penales</span>
      </button>

      <button class="game-card" data-game="math-game">
        <span class="card-emoji">🧮</span>
        <span class="card-title">Penalty Math</span>
        <span class="card-desc">Suma, resta, multiplica y divide para anotar</span>
      </button>
    </div>
  </div>

  <!-- ---------- PANTALLA DE JUEGO (iframe aislado) ---------- -->
  <div id="gameScreen" class="hidden">
    <button id="backButton">← Volver al menú</button>
    <iframe id="gameFrame" title="Juego"></iframe>
  </div>

  <script src="main.js"></script>
</body>
</html>
